<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" width="100%" height="100%">
  <!-- Definitions for gradients and effects -->
  <defs>
    <linearGradient id="squareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink -->
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <g id="logo-mark">

    <path d="M100 100 l300 200 l0 300 l200 0 l0 -500 l300 600 l-300 600 l0 -500 l-200 0 l0 300 l-300 200 l0 -200 l100 -66.66666666666666 l0 -666.6666666666667 L100 300Z" fill="#00000000" stroke="#000000" stroke-width="10" stroke-linejoin="round"  stroke-linecap="round"/>
    <path d="M600 100 l150 600 l-150 600" fill="#00000000" stroke="#000000" stroke-width="10" stroke-linejoin="round"  stroke-linecap="round"/>
  </g>
</svg>
